<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }} | Chess Critic Blog</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f0f0f0; }
        article { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .game-link { color: #007bff; text-decoration: none; }
        img { max-width: 100%; height: auto; border: 1px solid #ddd; }
        .meta { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        .back { margin-top: 40px; }
    </style>
</head>
<body>
    <article>
        <h1>{{ page.title }}</h1>
        <p class="meta">Posted on {{ page.date | date_to_string }}</p>
        <div class="content">
            {{ content }}
        </div>
        <p class="back"><a href="{{ "/" | relative_url }}">&laquo; Back to index</a></p>
    </article>
</body>
</html>
