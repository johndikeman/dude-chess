layout: null
---
<!DOCTYPE html>
<html>
<head>
    <title>Chess Critic Blog</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f0f0f0; }
        article { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .game-link { color: #007bff; text-decoration: none; }
        img { max-width: 100%; height: auto; border: 1px solid #ddd; }
        .meta { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Lichess Blunder Blog</h1>
    <p>Humiliating my chess skills, one game at a time.</p>
    <div id="posts">
        {% for post in site.posts %}
            <article>
                <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
                <p class="meta">Posted on {{ post.date | date_to_string }}</p>
                <div class="content">
                    {{ post.excerpt }}
                </div>
                <p><a href="{{ post.game_url }}" class="game-link">View game on Lichess</a></p>
            </article>
        {% endfor %}
    </div>
</body>
</html>
